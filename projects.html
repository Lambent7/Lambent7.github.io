<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Projects | M.G. Portfolio</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="projects-browser">

    <aside id="filter-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Filters</h3>
            <div class="sidebar-actions">
                <button id="clear-filters" class="btn-text">Clear All</button>
                <button id="close-sidebar" class="btn-icon"><i data-lucide="x"></i></button>
            </div>
        </div>
        <div class="filter-category">
            <h4>Domain</h4>
            <div class="filter-group">
                <label class="filter-pill"><input type="checkbox" value="Hardware"> <span>Hardware</span></label>
                <label class="filter-pill"><input type="checkbox" value="Robotics"> <span>Robotics</span></label>
            </div>
        </div>
        <div class="filter-category">
            <h4>Technology</h4>
            <div class="filter-group">
                <label class="filter-pill"><input type="checkbox" value="TypeScript"> <span>TypeScript</span></label>
                <label class="filter-pill"><input type="checkbox" value="Frontend"> <span>Frontend</span></label>
            </div>
        </div>
    </aside>

    <main class="projects-content">
        <header class="controls-header">
            <div class="sorting-controls">
                <button id="sort-date" class="btn-secondary">Date <i id="sort-icon" data-lucide="chevron-down"></i></button>
            </div>

            <button onclick="window.location.href='/'" class="btn-secondary">Mitchell Graham Portfolio</button>

            <button id="open-sidebar" class="btn-primary"><i data-lucide="list-filter"></i> Filter</button>
        </header>

        <div id="project-grid" class="grid-container">
